apiVersion: apps/v1
kind: Deployment
metadata:
  name: web
  namespace: ai-risk
spec:
  replicas: 2
  selector: { matchLabels: { app: web } }
  template:
    metadata: { labels: { app: web } }
    spec:
      containers:
        - name: web
          image: ghcr.io/YOUR_ORG/ai-risk-web:dev
          ports: [{ containerPort: 5173 }]
---
apiVersion: v1
kind: Service
metadata:
  name: web
  namespace: ai-risk
spec:
  selector: { app: web }
  ports: [{ port: 80, targetPort: 5173 }]
