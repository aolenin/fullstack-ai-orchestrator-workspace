apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: ai-risk
spec:
  replicas: 2
  selector: { matchLabels: { app: backend } }
  template:
    metadata: { labels: { app: backend } }
    spec:
      containers:
        - name: backend
          image: ghcr.io/YOUR_ORG/ai-risk-backend:dev
          ports: [{ containerPort: 8000 }]
          envFrom:
            - configMapRef: { name: ai-risk-config }
            - secretRef: { name: ai-risk-secrets }
          readinessProbe:
            httpGet: { path: /api/health/, port: 8000 }
            initialDelaySeconds: 10
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: ai-risk
spec:
  selector: { app: backend }
  ports: [{ port: 8000, targetPort: 8000 }]
