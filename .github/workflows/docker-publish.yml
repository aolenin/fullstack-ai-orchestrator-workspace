name: docker-publish
on:
  push:
    branches: [main]
jobs:
  build:
    runs-on: ubuntu-latest
    permissions: { contents: read, packages: write }
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/ai-risk-backend:dev
      - uses: docker/build-push-action@v6
        with:
          context: ./web
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/ai-risk-web:dev
